<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Credit Risk AI v2.0 Architecture Diagram</title>
  <desc id="desc">A system architecture diagram showing the flow from raw CSV data through preprocessing, training, API, Streamlit UI, and LangGraph RAG agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F4C81"/>
      <stop offset="100%" stop-color="#2E86C1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f3b5b" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#355C7D"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #dcecff; }
      .boxTitle { font: 700 22px Arial, sans-serif; fill: #0f4c81; }
      .boxText { font: 400 15px Arial, sans-serif; fill: #243447; }
      .smallText { font: 400 13px Arial, sans-serif; fill: #40566f; }
      .label { font: 700 14px Arial, sans-serif; fill: #0f4c81; letter-spacing: 0.5px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="110" fill="url(#topBar)"/>
  <text x="800" y="48" text-anchor="middle" class="title">Credit Risk AI v2.0</text>
  <text x="800" y="78" text-anchor="middle" class="subtitle">Architecture flow from data input to scored output and agentic lending report</text>

  <!-- Main flow boxes -->
  <g filter="url(#shadow)">
    <rect x="60" y="170" rx="18" ry="18" width="250" height="140" fill="#ffffff" stroke="#d6e4f0" stroke-width="2"/>
    <rect x="350" y="170" rx="18" ry="18" width="300" height="140" fill="#ffffff" stroke="#d6e4f0" stroke-width="2"/>
    <rect x="690" y="170" rx="18" ry="18" width="330" height="140" fill="#ffffff" stroke="#d6e4f0" stroke-width="2"/>
    <rect x="1060" y="170" rx="18" ry="18" width="460" height="140" fill="#ffffff" stroke="#d6e4f0" stroke-width="2"/>

    <rect x="90" y="430" rx="18" ry="18" width="290" height="150" fill="#ffffff" stroke="#d6e4f0" stroke-width="2"/>
    <rect x="430" y="430" rx="18" ry="18" width="330" height="150" fill="#ffffff" stroke="#d6e4f0" stroke-width="2"/>
    <rect x="810" y="430" rx="18" ry="18" width="330" height="150" fill="#ffffff" stroke="#d6e4f0" stroke-width="2"/>
    <rect x="1190" y="430" rx="18" ry="18" width="320" height="150" fill="#ffffff" stroke="#d6e4f0" stroke-width="2"/>
  </g>

  <!-- Bottom output box -->
  <g filter="url(#shadow)">
    <rect x="300" y="700" rx="20" ry="20" width="1000" height="120" fill="#0f4c81" stroke="#0f4c81" stroke-width="2"/>
  </g>

  <!-- Top row labels -->
  <text x="185" y="205" text-anchor="middle" class="boxTitle">Raw CSV Data</text>
  <text x="185" y="240" text-anchor="middle" class="boxText">Home Credit source files</text>
  <text x="185" y="262" text-anchor="middle" class="smallText">application, bureau, payments, balances</text>

  <text x="500" y="205" text-anchor="middle" class="boxTitle">Preprocessing</text>
  <text x="500" y="240" text-anchor="middle" class="boxText">Validation and aggregation</text>
  <text x="500" y="262" text-anchor="middle" class="smallText">feature engineering and schema checks</text>

  <text x="855" y="205" text-anchor="middle" class="boxTitle">Model Training</text>
  <text x="855" y="240" text-anchor="middle" class="boxText">Random Forest + Logistic Regression</text>
  <text x="855" y="262" text-anchor="middle" class="smallText">threshold selection, metrics, SHAP artifacts</text>

  <text x="1290" y="205" text-anchor="middle" class="boxTitle">Serving Layer</text>
  <text x="1290" y="240" text-anchor="middle" class="boxText">FastAPI + Streamlit</text>
  <text x="1290" y="262" text-anchor="middle" class="smallText">prediction, report, health, preprocess endpoints</text>

  <!-- Middle row labels -->
  <text x="235" y="468" text-anchor="middle" class="boxTitle">Manual Input UI</text>
  <text x="235" y="503" text-anchor="middle" class="boxText">Sliders and textboxes</text>
  <text x="235" y="525" text-anchor="middle" class="smallText">borrower profile entry in Streamlit</text>

  <text x="595" y="468" text-anchor="middle" class="boxTitle">Predictor</text>
  <text x="595" y="503" text-anchor="middle" class="boxText">Load trained artifacts</text>
  <text x="595" y="525" text-anchor="middle" class="smallText">score, class, confidence, top features</text>

  <text x="975" y="468" text-anchor="middle" class="boxTitle">LangGraph Agent</text>
  <text x="975" y="503" text-anchor="middle" class="boxText">Profile → Risk → Retrieval → Report</text>
  <text x="975" y="525" text-anchor="middle" class="smallText">deterministic lending report pipeline</text>

  <text x="1350" y="468" text-anchor="middle" class="boxTitle">RAG Index</text>
  <text x="1350" y="503" text-anchor="middle" class="boxText">Local regulatory documents</text>
  <text x="1350" y="525" text-anchor="middle" class="smallText">FAISS retrieval with citations</text>

  <!-- Bottom box text -->
  <text x="800" y="740" text-anchor="middle" style="font: 700 26px Arial, sans-serif; fill: #ffffff;">Final Outputs</text>
  <text x="800" y="775" text-anchor="middle" style="font: 400 18px Arial, sans-serif; fill: #e8f2ff;">Risk score, risk class, confidence, SHAP explanations, and structured lending report with disclaimer</text>
  <text x="800" y="805" text-anchor="middle" style="font: 400 16px Arial, sans-serif; fill: #d0e1f7;">Designed for manual review support, transparency, and regulatory context</text>

  <!-- Arrows -->
  <line x1="310" y1="240" x2="350" y2="240" stroke="#355C7D" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="650" y1="240" x2="690" y2="240" stroke="#355C7D" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1020" y1="240" x2="1060" y2="240" stroke="#355C7D" stroke-width="5" marker-end="url(#arrow)"/>

  <line x1="1430" y1="310" x2="1430" y2="430" stroke="#355C7D" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1290" y1="310" x2="975" y2="430" stroke="#355C7D" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="790" y1="310" x2="595" y2="430" stroke="#355C7D" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="310" x2="235" y2="430" stroke="#355C7D" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M 235 580 C 235 650, 410 680, 520 700" fill="none" stroke="#355C7D" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 595 580 C 600 650, 655 680, 760 700" fill="none" stroke="#355C7D" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 975 580 C 965 650, 900 680, 880 700" fill="none" stroke="#355C7D" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1350 580 C 1340 650, 1180 680, 1060 700" fill="none" stroke="#355C7D" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Footer note -->
  <text x="800" y="885" text-anchor="middle" class="label">LoanVati Phase 2 Technical Architecture</text>
</svg>
