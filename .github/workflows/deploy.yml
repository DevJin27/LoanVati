name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - "phase-2/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    if: ${{ secrets.HF_TOKEN != '' && vars.HF_SPACE_REPO != '' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create phase-2 subtree
        run: git subtree split --prefix=phase-2 -b phase2-deploy

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
        run: |
          git config --global user.email "deploy@github-actions.com"
          git config --global user.name "GitHub Actions"
          git remote add hf "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}"
          git push hf phase2-deploy:main --force
